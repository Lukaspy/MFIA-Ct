# MFIA-cf measurement plan — 2013-3 (n-Si), Block A–E protocol.
#
# Load in mfia-cf with "Load plan…" (stages every block into the overnight
# queue, in order), then press Run queue. Field reference:
# docs/measurement-plan-format.md.
#
# NOTE: Block A's *compensation* is a manual LabOne step (open/short/load) the
# tool can't drive — do it before loading the plan. Compensate over your full
# sweep range; "standard" precision is fine (the fixture is clean, ~1.77 fF open).
#
# B1500 GROUND TRUTH (dark): ~1.3 nF / 16 MΩ at -2 V, 1 kHz. A clean MFIA sweep
# should converge to that in the 1 kHz overlap before you trust anything lower.
#
# CURRENT RANGE: auto-range misbehaves on this high-Z / low-current device at
# low f (a few nA), worst at the most-insulating bias. A full C-f spans ~14 MΩ
# → 1 kΩ (4 decades) so no single fixed range fits — leave those on auto. Pin a
# sensitive range only on fixed-frequency C-V and narrow low-f-only blocks, and
# VALIDATE the pinned value against the B1500 number above before trusting it.
#
# n-Si POLARITY: the photo-active (reverse-biased) junction is held NEGATIVE, so
# the anchor is reverse-active at -2 V (mirror of +2 V on p-Si). Heads-up: -2 V
# is also the *hardest* bias for the MFIA here (most insulating → lowest current
# at low f), so that's exactly where to lean on the range knob + validation.

device:
  id: "2013-3"
  substrate: "n-Si"
  notes: "OGT MSM, batch 3 — Block A–E protocol (n-Si; reverse-active anchor = -2 V)"

output_dir: "/data/mfia/2013-3"   # all CSVs land here (Cf/CV prefixes don't collide)

# Shared instrument + timing defaults. Any block can override these inline.
# Tuned setup (from debugging this device vs the B1500):
defaults:
  amplitude_mv_rms: 100          # ~3x current vs 30 mV; <=2% nonlinear even lit (per the IV)
  terminal_mode: 2-terminal      # ±10 V bias range (needed for the ±4 V ladder; 4-terminal caps at ±3 V)
  equiv_circuit: Cp||Rp
  device_settle_s: 10            # short DC settle after a light/bias step (OGT is fast)
  dark_settle_s: 10              # dark-bracket dwell (drift/recovery check)
  settling_tcs: 15               # bumped from 7 — clears the low-f settling artifacts
  auto_bandwidth: true
  current_range_a: auto          # auto for wide C-f sweeps; pinned only where one range fits (below)
  freq:                          # default C-f sweep window (1 Hz floor)
    start_hz: 1
    stop_hz: 300000
    points_per_decade: 10

blocks:
  # ---- Block A: setup & baseline (after manual compensation) ----
  # QA sweep at +1 V so it overlaps existing B1500 dark C-f (which was taken at
  # +1..+4 V) — that's the band where the MFIA-vs-B1500 cross-check is valid.
  - name: "A: QA dark sweep (B1500 overlap)"
    type: c-f
    bias: [1]
    illumination: {dark_only: true}

  - name: "A: dark baseline @ anchor"
    type: c-f
    bias: [-2]                   # reverse-active anchor for n-Si
    illumination: {dark_only: true}

  # ---- Range-knob validation: narrow low-f C-f, PINNED range ----
  # Quick check before the long blocks. 1 Hz–1 kHz so one sensitive range fits.
  # Compare the result to the B1500 (-2 V should trend toward ~16 MΩ / ~1.3 nF
  # in the kHz end). If 100 nA still reads junk at the very bottom, step the
  # range (47 nA-ish lives between 10 nA and 100 nA on the MFIA) or nudge it up.
  - name: "A: range check @ anchor (1 Hz–1 kHz, 100 nA)"
    type: c-f
    bias: [-2]
    current_range_a: 1.0e-7      # 100 nA — VALIDATE vs B1500, then adopt/tune
    freq:
      start_hz: 1
      stop_hz: 1000
      points_per_decade: 12
    illumination: {dark_only: true}

  # ---- Block B: C-f spectral grid @ anchor bias, 1 Hz floor ----
  # For each wavelength (randomized order): dark-pre, ramp intensity, dark-post.
  - name: "B: spectral grid @ anchor"
    type: c-f
    bias: [-2]                   # reverse-active anchor for n-Si
    illumination:
      mode: matrix
      wavelengths: [385, 470, 505, 530, 590, 625, 740, 850]
      order: randomized          # seeded → reproducible; realized order is fixed at load
      seed: 1
      intensities: [1, 3, 10, 30, 100]   # monotonic increasing
      dark_bracket: per-wavelength        # dark pre + post around each wavelength's ramp

  # ---- Block C: C-f bias ladder @ one bright reference, 1 Hz floor ----
  # 1/C² vs V (Mott-Schottky), light-effect collapse, forward-bias MSM null.
  # Spans both polarities, so it covers the forward (null) and reverse (active)
  # sides regardless of substrate — no change needed for n-Si.
  - name: "C: bias ladder @ 625nm"
    type: c-f
    bias: [-4, -2, 0, 1, 2, 4]
    illumination:
      mode: fixed                 # this exact illumination runs at every bias
      steps:
        - dark
        - {wl: 625, intensity: 100}

  # ---- Block D: C-f deep anchors @ 10 mHz ----
  # The strongest conditions + dark; long sweeps that close the slow arc. Bump
  # the device settle for the slow-trap tail. Two lit anchors: 625 nm (film/edge,
  # ties to the hot-chuck Arrhenius data) and 740 nm (substrate-only probe — below
  # the Ge2Se3 gap, the most diagnostic point for the substrate-junction story).
  # Three deep sweeps (~45 min each) + dark.
  - name: "D: deep anchor @ 10 mHz"
    type: c-f
    bias: [-2]                   # reverse-active anchor for n-Si
    device_settle_s: 25           # override: let the ~tens-of-seconds trap settle
    freq:
      start_hz: 0.01              # 10 mHz floor
      stop_hz: 300000
      points_per_decade: 8
    illumination:
      mode: fixed
      steps:
        - dark
        - {wl: 625, intensity: 100}
        - {wl: 740, intensity: 100}   # substrate-only deep anchor

  # ---- Block E: C-V dispersion across 1/10/100/1000 Hz ----
  # Anchors (470/505, 625, 740) get the full intensity set; the rest get
  # dark + 100% only. Frequencies high→low so the reliable data lands first.
  # (C-V sweeps bias internally, so it carries the fine voltage/trap dispersion.)
  # Left on auto-range: one block spans 1 Hz–1 kHz, so no single fixed range
  # fits all four frequencies. If the 1 Hz C-V comes back corrupted, split it
  # into its own block with a pinned `current_range_a` (the optimal range at
  # 1 Hz is more sensitive than at 1 kHz).
  - name: "E: C-V dispersion"
    type: c-v
    frequencies: [1000, 100, 10, 1]
    bias: {start_v: -4, stop_v: 4, points: 101}
    illumination:
      mode: matrix
      dark_bracket: per-wavelength
      wavelengths:
        - {nm: 470, intensities: [1, 3, 10, 30, 100]}   # anchor: full set
        - {nm: 505, intensities: [1, 3, 10, 30, 100]}   # anchor
        - {nm: 625, intensities: [1, 3, 10, 30, 100]}   # anchor
        - {nm: 740, intensities: [1, 3, 10, 30, 100]}   # anchor
        - {nm: 385, intensities: [100]}                 # others: 100% only
        - {nm: 530, intensities: [100]}
        - {nm: 590, intensities: [100]}
        - {nm: 850, intensities: [100]}
