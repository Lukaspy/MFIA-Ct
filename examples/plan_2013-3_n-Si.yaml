# === LOCKED-IN MFIA procedure (template — copy per device) ===
# Reflects everything we learned debugging 2013-3 (n-Si) against the B1500.
#
# DIVISION OF LABOR (the key decision, baked in):
#   MFIA does what it's good at:
#     - sub-kHz extension at a LOW-LEAKAGE bias (0 V) + the wavelength × intensity
#       illumination matrix  <- the data the B1500 cannot give
#     - high-f (>=1 kHz) C-f / C-V at ALL biases  <- overlaps + cross-checks B1500
#   B1500 does the biased low-f (reverse-anchor slow arc): the MFIA physically
#   can't — at reverse bias the DC leakage current (~50 nA) swamps the AC signal
#   (~1.5 nA) in its single shared current input, no AC-coupling/decoupling node
#   exists, and sub-kHz there reads ~100x wrong. The device is fine (B1500:
#   ~1.3 nF / 16 MΩ at -2 V); it's an MFIA architecture limit.
#
# WHY 0 V for the low-f grid: 0 V leaks only ~2 nA, so a sensitive current range
# fits and the MFIA can actually reach 1 Hz there.
#   CAVEAT: if your trap physics needs the reverse bias, the sub-kHz-at-reverse
#   data isn't cleanly reachable by either instrument. A MODEST reverse bias
#   (-0.5 / -1 V, lower leakage) is the compromise to try — change Block B's bias
#   and re-validate the pinned range against the B1500.
#
# PER DEVICE: change device.id / substrate / output_dir (and the 0 V anchor if a
# device's low-leakage bias differs). Compensate open/short (standard precision)
# over the sweep range first.

device:
  id: "2013-3"
  substrate: "n-Si"
  notes: "Locked-in MFIA procedure (MFIA = low-leakage low-f + matrix + high-f; B1500 = biased low-f)"

output_dir: "/home/lukas/Documents/capacitance_measurements/2013-3"

defaults:
  amplitude_mv_rms: 30          # 100 mV was WORSE on this nonlinear DUT
  terminal_mode: 2-terminal     # ±10 V bias range
  equiv_circuit: Cp||Rp
  device_settle_s: 10           # short DC settle (OGT is fast)
  dark_settle_s: 10
  settling_tcs: 15              # clears the low-f settling artifacts
  auto_bandwidth: true
  oversampling: 1               # Block B overrides this; high-f blocks don't need it
  current_range_a: auto         # Block B pins a sensitive range; wide blocks stay auto
  freq:
    start_hz: 1
    stop_hz: 300000
    points_per_decade: 10

blocks:
  # ---- A: QA dark + baseline at the low-leakage anchor ----
  - name: "A: QA dark @ 0V"
    type: c-f
    bias: [0]
    illumination: {dark_only: true}

  # ---- B: MFIA's unique contribution — sub-kHz illumination matrix @ 0 V ----
  # Low leakage at 0 V lets a sensitive range + oversampling reach 1 Hz.
  # NOTE: oversampling makes the low-f points slow; with the full 8λ × 5 matrix
  # this is an overnight block. Trim intensities or wavelengths if too long.
  - name: "B: spectral grid @ 0V (sub-kHz)"
    type: c-f
    bias: [0]
    current_range_a: 1.0e-8      # 10 nA — validate vs B1500 before trusting
    oversampling: 20             # SNR at low f (slow!); push higher only if it helps
    illumination:
      mode: matrix
      wavelengths: [385, 470, 505, 530, 590, 625, 740, 850]
      order: randomized
      seed: 1
      intensities: [1, 3, 10, 30, 100]
      dark_bracket: per-wavelength

  # ---- C: bias ladder @ 625 nm, HIGH-F ONLY (Mott-Schottky + B1500 overlap) ----
  # 1/C² vs V and the light-effect collapse live in the depletion C, which is
  # well-defined >= 1 kHz; the reverse-bias low-f is the B1500's job.
  - name: "C: bias ladder @ 625nm (high-f)"
    type: c-f
    bias: [-4, -2, -1, 0, 1, 2, 4]
    freq: {start_hz: 1000, stop_hz: 300000, points_per_decade: 10}
    illumination:
      mode: fixed
      steps:
        - dark
        - {wl: 625, intensity: 100}

  # ---- E: C-V dispersion at the trustworthy / B1500-overlap frequencies ----
  # 1 kHz and 100 Hz are clean and overlap the B1500. 1/10 Hz dropped: the
  # reverse-bias half of those is corrupted (DC-leakage limit) and they're slow.
  - name: "E: C-V dispersion (1 kHz / 100 Hz)"
    type: c-v
    frequencies: [1000, 100]
    bias: {start_v: -4, stop_v: 4, points: 101}
    illumination:
      mode: matrix
      dark_bracket: per-wavelength
      wavelengths:
        - {nm: 470, intensities: [1, 3, 10, 30, 100]}
        - {nm: 505, intensities: [1, 3, 10, 30, 100]}
        - {nm: 625, intensities: [1, 3, 10, 30, 100]}
        - {nm: 740, intensities: [1, 3, 10, 30, 100]}
        - {nm: 385, intensities: [100]}
        - {nm: 530, intensities: [100]}
        - {nm: 590, intensities: [100]}
        - {nm: 850, intensities: [100]}

  # DROPPED vs the old A–E plan: Block D (10 mHz deep anchors @ -2 V) — the
  # MFIA can't reach it (reverse-bias DC-leakage limit). That slow-arc data is
  # B1500 territory, or simply not accessible sub-1-kHz at reverse bias.
