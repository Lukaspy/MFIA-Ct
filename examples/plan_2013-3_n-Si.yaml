# === MFIA C-f / C-V campaign — 2013-3 (n-Si). Template, copy per device. ===
#
# Plain and correct, now that the setup is understood. The earlier "MFIA can't
# do biased low-f" verdict was wrong — it was the drain miswired to HPOT plus a
# tool bug (auto-output ignored the DC bias, so bias over-ranged the output ->
# OVO). Wired right + explicit output range, the MFIA reads a clean capacitor on
# plain AUTO range across the band, biased or not (validated against the webUI
# and the B1500). So: no pinned ranges, no oversampling tricks, no high-f-only
# restrictions, no B1500 hand-off. Just the measurement.
#
# Settings match the validated webUI config: 2-terminal, AUTO current range,
# 30 mV (kept modest for IV linearity on this junction). The tool now sets the
# output range to fit the bias automatically (hardware.configure_impedance_for_cf).
#
# PER DEVICE: change device.id / substrate / output_dir. Confirm terminal mode
# matches the B1500 reference. Compensate open/short (standard) over the range
# first. If 30 mV is noisy at the high-Z low-f tail, bump amplitude a little or
# set a block-level `oversampling: 10-50` — but it should be clean.

device:
  id: "2013-3"
  substrate: "n-Si"
  notes: "Campaign — reverse-active anchor -2 V; auto range; 30 mV"

output_dir: "/home/lukas/Documents/capacitance_measurements/2013-3"

defaults:
  amplitude_mv_rms: 30
  terminal_mode: 2-terminal
  equiv_circuit: Cp||Rp
  device_settle_s: 10
  dark_settle_s: 10
  settling_tcs: 15
  auto_bandwidth: true
  oversampling: 1               # off; fallback for low-f SNR if needed
  current_range_a: auto         # auto everywhere, like the webUI
  freq:
    start_hz: 1
    stop_hz: 500000
    points_per_decade: 10

blocks:
  # ---- A: dark baseline / QA at the anchor and 0 V ----
  - name: "A: dark baseline (-2 V, 0 V)"
    type: c-f
    bias: [-2, 0]
    illumination: {dark_only: true}

  # ---- B: spectral grid — λ × intensity matrix at the reverse-active anchor ----
  # The photo-response / trap dispersion across the full band, at the trap bias.
  - name: "B: spectral grid @ -2 V"
    type: c-f
    bias: [-2]
    illumination:
      mode: matrix
      wavelengths: [385, 470, 505, 530, 590, 625, 740, 850]
      order: randomized
      seed: 1
      intensities: [1, 3, 10, 30, 100]
      dark_bracket: per-wavelength

  # ---- C: bias ladder @ 625 nm (dark vs bright) ----
  # Mott-Schottky 1/C² vs V and the light-effect collapse, full band per bias.
  - name: "C: bias ladder @ 625 nm"
    type: c-f
    bias: [-4, -2, -1, 0, 1, 2, 4]
    illumination:
      mode: fixed
      steps:
        - dark
        - {wl: 625, intensity: 100}

  # ---- E: C-V dispersion at several test frequencies ----
  # Voltage/trap dispersion; frequencies high->low so the fast data lands first.
  # 1 Hz is slow (settling × 101 points) — drop it for a faster first pass.
  - name: "E: C-V dispersion (1k / 100 / 10 / 1 Hz)"
    type: c-v
    frequencies: [1000, 100, 10, 1]
    bias: {start_v: -4, stop_v: 4, points: 101}
    illumination:
      mode: matrix
      dark_bracket: per-wavelength
      wavelengths:
        - {nm: 470, intensities: [1, 3, 10, 30, 100]}
        - {nm: 505, intensities: [1, 3, 10, 30, 100]}
        - {nm: 625, intensities: [1, 3, 10, 30, 100]}
        - {nm: 740, intensities: [1, 3, 10, 30, 100]}
        - {nm: 385, intensities: [100]}
        - {nm: 530, intensities: [100]}
        - {nm: 590, intensities: [100]}
        - {nm: 850, intensities: [100]}
