# === FILTERED NEGATIVE-BIAS RETAKE — 2013-3, recovered/steady state ===
# Lesson from session #1 (2026-07-09): each NEGATIVE bias step triggers a
# transient conduction collapse (kOhm-class!) relaxing over ~1-2 min. The
# first pass measured the transients (15 s settle). This retake uses 90-120 s
# device settles so each sweep sees the STEADY state (~10 MOhm, probed 17:4x).
# Filter IN (pi filter, R=9906+2x9.9nF), comp OFF, de-embed offline.
# Probe-verified currents (steady state, 30 mV): 2-92 nA across 1-300 Hz.

device:
  id: "2013-3"
  substrate: "n-Si"
  notes: "Filtered negative retake, steady-state, transient-aware settles"

output_dir: "/home/lukas/Documents/capacitance_measurements/2013-3_filtered_lowf"

defaults:
  amplitude_mv_rms: 30
  light_amplitude_mv_rms: 30
  terminal_mode: 2-terminal
  equiv_circuit: Cp||Rp
  device_settle_s: 90
  dark_settle_s: 10
  settling_tcs: 15
  auto_bandwidth: true
  oversampling: 10
  averaging_tcs: 15
  compensation_enabled: false
  current_range_a: 1.0e-6
  freq:
    start_hz: 30
    stop_hz: 300
    points_per_decade: 10

blocks:
  - name: "neg retake 30-300 Hz (1 uA, 90 s settles)"
    type: c-f
    bias: [-1, -2, -4, -7]
    current_range_a: 1.0e-6
    freq: {start_hz: 30, stop_hz: 300, points_per_decade: 10}
    illumination: {dark_only: true}

  - name: "neg retake 3-30 Hz (100 nA, 90 s settles)"
    type: c-f
    bias: [-1, -2, -4, -7]
    current_range_a: 1.0e-7
    freq: {start_hz: 3, stop_hz: 30, points_per_decade: 10}
    illumination: {dark_only: true}

  - name: "neg retake 1-3 Hz (10 nA, 120 s settles)"
    type: c-f
    bias: [-1, -2, -4, -7]
    current_range_a: 1.0e-8
    device_settle_s: 120
    settling_tcs: 20
    averaging_tcs: 20
    freq: {start_hz: 1, stop_hz: 3, points_per_decade: 8}
    illumination: {dark_only: true}
