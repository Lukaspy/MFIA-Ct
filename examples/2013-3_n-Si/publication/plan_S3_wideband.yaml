# === S3 (D3) action spectrum — WIDEBAND half (runner). Filtered λ-spots run
# separately via manual_lit_spots.py per METHOD MAP. Dim only (1/3%).
device: {id: "2013-3", substrate: "n-Si", notes: "S3 action spectrum wideband"}
output_dir: "/home/lukas/Documents/capacitance_measurements/2013-3_S3_action"
defaults:
  amplitude_mv_rms: 30
  light_amplitude_mv_rms: 30
  terminal_mode: 2-terminal
  equiv_circuit: Cp||Rp
  device_settle_s: 300
  dark_settle_s: 60
  settling_tcs: 15
  auto_bandwidth: true
  oversampling: 10
  averaging_tcs: 15
  compensation_enabled: false
  current_range_a: auto
  filter_state: "out"
  freq: {start_hz: 340, stop_hz: 500000, points_per_decade: 10}
blocks:
  - name: "S3 wideband spectral matrix @-2 V (8 lambda x 1/3%, randomized)"
    type: c-f
    bias: [-2]
    illumination:
      mode: matrix
      wavelengths: [385, 470, 505, 530, 590, 625, 740, 850]
      order: randomized
      seed: 20260714
      intensities: [1, 3]
      dark_bracket: per-wavelength
