# === S2b-v3 negative rungs — U-WIDEBAND ONLY (filtered rungs = manual_rungs.py per METHOD MAP) (2026-07-13) ===
# S2a-v2 finding: within-pass rung revisits (U-block then F-block then repeats)
# blow the visit budget — POSITIVE rungs also fluctuate by visit 3-4 (kOhm
# collapse under the fine pin). v3: ONE visit per rung per pass; at each rung
# measure filtered band then wideband back-to-back (switcher toggles per
# block); repeats come from x3 passes only. v3.1 (2026-07-13 22:15): U runs
# FIRST at each rung — S2b-v3 showed the post-step transient outlasts 300 s
# (F-first chaos, U-after clean at every rung); U doubles as settle buffer so
# F measures ~8-10 min post-step. Comp OFF everywhere (post-hoc).
device: {id: "2013-3", substrate: "n-Si", notes: "S2b-v3 negative rungs bias-major v3"}
output_dir: "/home/lukas/Documents/capacitance_measurements/2013-3_S2b_neg"
defaults:
  amplitude_mv_rms: 30
  light_amplitude_mv_rms: 30
  terminal_mode: 2-terminal
  equiv_circuit: Cp||Rp
  device_settle_s: 300
  dark_settle_s: 10
  settling_tcs: 15
  auto_bandwidth: true
  oversampling: 10
  averaging_tcs: 15
  compensation_enabled: false
  current_range_a: auto
  freq: {start_hz: 1000, stop_hz: 500000, points_per_decade: 10}
blocks:
  - name: "anchor 0V start"
    type: c-f
    bias: [0]
    filter_state: "out"
    device_settle_s: 60
    illumination: {dark_only: true}
  - name: "U 340-500k @-1 V (rung entry; doubles as settle buffer)"
    type: c-f
    bias: [-1]
    filter_state: "out"
    device_settle_s: 300
    freq: {start_hz: 340, stop_hz: 500000, points_per_decade: 10}
    illumination: {dark_only: true}
  - name: "U 340-500k @-2 V (rung entry; doubles as settle buffer)"
    type: c-f
    bias: [-2]
    filter_state: "out"
    device_settle_s: 300
    freq: {start_hz: 340, stop_hz: 500000, points_per_decade: 10}
    illumination: {dark_only: true}
  - name: "U 340-500k @-4 V (rung entry; doubles as settle buffer)"
    type: c-f
    bias: [-4]
    filter_state: "out"
    device_settle_s: 300
    freq: {start_hz: 340, stop_hz: 500000, points_per_decade: 10}
    illumination: {dark_only: true}
  - name: "U 340-500k @-7 V (rung entry; doubles as settle buffer)"
    type: c-f
    bias: [-7]
    filter_state: "out"
    device_settle_s: 300
    freq: {start_hz: 340, stop_hz: 500000, points_per_decade: 10}
    illumination: {dark_only: true}
  - name: "anchor 0V end"
    type: c-f
    bias: [0]
    filter_state: "out"
    device_settle_s: 60
    illumination: {dark_only: true}
