# MFIA-cf TEST plan — validate the tool against the LabOne webUI. NOT the campaign.
#
# The whole high-Z saga turned out to be (1) the drain miswired to HPOT instead
# of HCUR, and (2) a tool bug: auto-output sized the output range to the 30 mV AC
# and ignored the DC bias, so any bias over-ranged the output -> OVO -> garbage.
# Wired right + an explicit output range, the webUI reads a clean capacitor on
# plain AUTO range. So this plan is deliberately boring: auto range, 30 mV, no
# pinned range, no oversampling — just confirm the tool matches the webUI.
#
#   Goal 1 (0 V): should overlay your webUI 0 V sweep almost exactly — a clean
#     capacitor, |Z| falling ~16 MΩ (1 Hz) toward ~hundreds of Ω at high f,
#     phase a smooth -80° -> 0°. POSITIVE G throughout.
#   Goal 2 (-2 V): no OVO (the output-range fix), and a clean biased capacitor
#     shifted from the 0 V curve (more depletion).
#
# If 0 V matches the webUI, the measurement chain is correct and the campaign
# plan is trustworthy. If 30 mV looks noisy vs the webUI's 300 mV, bump
# amplitude a little or add modest oversampling — but try it clean first.
# Compensate open/short (standard) over the range first.

device:
  id: "2013-3"
  substrate: "n-Si"
  notes: "TEST — match the webUI (auto range, 30 mV), confirm 0 V overlay + -2 V no-OVO"

output_dir: "/home/lukas/Documents/capacitance_measurements/ranging_test/test4"

defaults:
  amplitude_mv_rms: 30
  terminal_mode: 2-terminal
  equiv_circuit: Cp||Rp
  device_settle_s: 10
  dark_settle_s: 10
  settling_tcs: 15
  auto_bandwidth: true
  oversampling: 1            # off — auto range alone should match the webUI
  current_range_a: auto      # AUTO, like the webUI (no pinning)
  freq:
    start_hz: 1
    stop_hz: 500000
    points_per_decade: 10

blocks:
  # Amplitude sweep: 30 mV is marginal at the high-Z low-f tail (~2 nA at 1 Hz,
  # auto-range can't lock -> the low-f scatter). The webUI was clean at 300 mV.
  # Run 30 / 100 / 300 mV at 0 V and -2 V dark and see where the low-f locks in.
  # 300 mV reproduces the webUI (confirms the tool matches); 100 mV is the most
  # the dark IV stays linear at — pick the lowest amplitude with a clean tail.
  - name: "0V dark @ 30 mV"
    type: c-f
    bias: [0]
    amplitude_mv_rms: 30
    illumination: {dark_only: true}
  - name: "0V dark @ 100 mV"
    type: c-f
    bias: [0]
    amplitude_mv_rms: 100
    illumination: {dark_only: true}
  - name: "0V dark @ 300 mV (= webUI)"
    type: c-f
    bias: [0]
    amplitude_mv_rms: 300
    illumination: {dark_only: true}
  - name: "-2V dark @ 30 mV"
    type: c-f
    bias: [-2]
    amplitude_mv_rms: 30
    illumination: {dark_only: true}
  - name: "-2V dark @ 100 mV"
    type: c-f
    bias: [-2]
    amplitude_mv_rms: 100
    illumination: {dark_only: true}
  - name: "-2V dark @ 300 mV (= webUI)"
    type: c-f
    bias: [-2]
    amplitude_mv_rms: 300
    illumination: {dark_only: true}
