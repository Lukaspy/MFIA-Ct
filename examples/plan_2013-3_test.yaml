# MFIA-cf TEST plan — can the -2 V low-f tail be recovered? NOT the campaign.
#
# Where we are: output-range/OVO fix works, high-f is a clean capacitor at any
# bias, and 0 V is fully clean at 100 mV (the campaign amplitude). The one
# remaining problem is the -2 V LOW-F tail: at -2 V the device leaks ~54 nA DC,
# which forces the input auto-range coarse, and the small low-f AC current
# (~6 nA) drowns in it -> inductive/neg-G garbage below ~100 Hz. 0 V (~2 nA
# leakage) stays on a sensitive range and is clean. Amplitude doesn't fix it
# (30/100/300 mV all bad at -2 V).
#
# This tests the one lever suited to a small signal on a coarse range:
# OVERSAMPLING (average the demod down). Narrow 1-30 Hz to keep it quick.
#   Win = -2 V low-f goes positive-G, phase settles smooth, |Z| climbs toward
#   the ~20-37 MΩ resistive plateau (matching the B1500 at the kHz overlap).
#   If oversampling doesn't fix the SYSTEMATIC inductive phase, the -2 V low-f
#   is genuinely DC-leakage-limited and the campaign uses -2 V for high-f only.
#
# 100 mV throughout (the validated 0 V amplitude). Compensate first.

device:
  id: "2013-3"
  substrate: "n-Si"
  notes: "TEST — recover -2 V low-f via oversampling? 0 V already clean at 100 mV"

output_dir: "/home/lukas/Documents/capacitance_measurements/ranging_test/test5"

defaults:
  amplitude_mv_rms: 100         # the validated 0 V amplitude
  terminal_mode: 2-terminal
  equiv_circuit: Cp||Rp
  device_settle_s: 10
  dark_settle_s: 10
  settling_tcs: 15
  auto_bandwidth: true
  oversampling: 1
  current_range_a: auto
  freq:
    start_hz: 1
    stop_hz: 500000
    points_per_decade: 10

blocks:
  # Reference: 0 V should be clean end-to-end at 100 mV (sanity that nothing regressed).
  - name: "0V dark @ 100 mV (clean reference)"
    type: c-f
    bias: [0]
    illumination: {dark_only: true}

  # -2 V low-f, oversampling ladder (narrow 1-30 Hz).
  - name: "-2V @ 100mV, oversampling 1 (baseline)"
    type: c-f
    bias: [-2]
    freq: {start_hz: 1, stop_hz: 30, points_per_decade: 10}
    illumination: {dark_only: true}
  - name: "-2V @ 100mV, oversampling 50"
    type: c-f
    bias: [-2]
    oversampling: 50
    freq: {start_hz: 1, stop_hz: 30, points_per_decade: 10}
    illumination: {dark_only: true}
  - name: "-2V @ 100mV, oversampling 200"
    type: c-f
    bias: [-2]
    oversampling: 200
    freq: {start_hz: 1, stop_hz: 30, points_per_decade: 10}
    illumination: {dark_only: true}
  # Is it settling, not noise? oversampling 50 + longer per-point settle.
  - name: "-2V @ 100mV, oversampling 50, settle 30 TC"
    type: c-f
    bias: [-2]
    oversampling: 50
    settling_tcs: 30
    freq: {start_hz: 1, stop_hz: 30, points_per_decade: 10}
    illumination: {dark_only: true}
